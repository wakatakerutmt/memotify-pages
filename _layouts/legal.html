<!doctype html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
  <title>{{ page.title }}</title>
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <style>
    :root {
      --fg: #1A1A1A;
      --muted: #555;
      --link: #1A1A1A;
      --bg: #FFF;
      --rule: #E0E0E0;
    }
    @media (prefers-color-scheme: dark) {
      :root { --fg: #ECECEC; --muted: #A0A0A0; --link: #ECECEC; --bg: #1A1A1A; --rule: #333; }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
                   "Noto Sans JP", Roboto, "Helvetica Neue", sans-serif;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 22px 80px;
      line-height: 1.75;
      color: var(--fg);
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
    }
    h1 { font-size: 28px; line-height: 1.3; margin-top: 0; }
    h2 { font-size: 20px; line-height: 1.4; margin-top: 36px; padding-top: 4px; border-top: 1px solid var(--rule); }
    h3 { font-size: 16px; margin-top: 24px; }
    p, li { font-size: 15px; }
    a { color: var(--link); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { text-decoration: none; }
    code { background: rgba(127, 127, 127, 0.14); padding: 1px 5px; border-radius: 4px; font-size: 0.92em; }
    hr { border: none; border-top: 1px solid var(--rule); margin: 36px 0; }
    nav.lang-switch { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    nav.lang-switch a { color: var(--muted); margin: 0 4px; }
    footer { margin-top: 56px; padding-top: 16px; border-top: 1px solid var(--rule); font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <nav class="lang-switch">
    <a href="{{ '/legal/terms.ja/' | relative_url }}">利用規約 (JP)</a> ·
    <a href="{{ '/legal/terms.en/' | relative_url }}">Terms (EN)</a> ·
    <a href="{{ '/legal/privacy.ja/' | relative_url }}">プライバシーポリシー (JP)</a> ·
    <a href="{{ '/legal/privacy.en/' | relative_url }}">Privacy (EN)</a>
  </nav>
  {{ content }}
  <footer>
    Memotify · <a href="https://github.com/wakatakerutmt/memotify">Source on GitHub</a>
  </footer>
</body>
</html>
